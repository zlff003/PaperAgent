server {
  listen 80;
  server_name _;

  # 允许上传最大 50MB 的文件
  client_max_body_size 50M;

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}
