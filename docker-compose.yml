services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATA_DIR=/app/data
      - PAPER_DIR=/app/data/papers
      - VECTOR_DIR=/app/data/chroma
      - DATABASE_URL=sqlite:////app/data/paperagent.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_CHAT_MODEL=${DASHSCOPE_CHAT_MODEL:-qwen-plus}
      - DASHSCOPE_EMBEDDING_MODEL=${DASHSCOPE_EMBEDDING_MODEL:-text-embedding-v3}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      - chroma

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  chroma:
    image: chromadb/chroma:0.5.23
    ports:
      - "8001:8000"
    volumes:
      - ./data/chroma:/chroma/chroma

